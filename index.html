  .input-row + .input-row { margin-top: 16px; padding-top: 16px; border-top: 1px solid #F0F0F0; }
  @media (max-width: 800px) { .input-row { grid-template-columns: 1fr 1fr; } }

  .input-row select { width: 100%; padding: 8px 12px; border: 1px solid #E5E5E5; border-radius: 4px; font-size: 14px; font-family: inherit; background: #fff; color: #1A1A1A; cursor: pointer; outline: none; }
  .input-row select:focus { border-color: #1B7B6E; }
  .btn-remove { width: 32px; height: 36px; border: 1px solid #E5E5E5; border-radius: 4px; background: #fff; color: #999; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-bottom: 1px; }
  .btn-remove:hover { background: #FEE; color: #C00; border-color: #C00; }
  .btn-add { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border: 1px dashed #1B7B6E; border-radius: 4px; background: #fff; color: #1B7B6E; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 16px; font-family: inherit; }
  .btn-add:hover { background: #F0F7F6; }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 0 24px; }
  @media (max-width: 700px) { .cards { grid-template-columns: 1fr; } }
  .card-head { background: #fff; border-top-left-radius: 8px; border-top-right-radius: 8px; padding: 20px 24px; }
  .card-head.elite { border: 1px solid #E5E5E5; }
  .card-head.ep { border: 1px solid #E5E5E5; position: relative; background: #FFFDF5; }
  .card-head h2 { font-size: 22px; font-weight: 700; }
  .card-head .sub { font-size: 13px; color: #999; margin-top: 4px; }
  .card-head .elp-info { font-size: 13px; color: #1B7B6E; font-weight: 600; margin-top: 2px; }
  .badge-rec { position: absolute; top: 12px; right: 12px; background: #E8B54D; color: #fff; font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 3px; letter-spacing: 0.05em; }
  .row { padding: 18px 24px; background: #fff; }
  .row.elite { border-left: 1px solid #E5E5E5; border-right: 1px solid #E5E5E5; border-bottom: 1px solid #F0F0F0; }
  .row.elite.last { border-bottom: 1px solid #E5E5E5; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; }
  .row.ep { border-left: 1px solid #E5E5E5; border-right: 1px solid #E5E5E5; border-bottom: 1px solid #F0F0F0; background: #FFFDF5; }
  .row.ep.last { border-bottom: 1px solid #E5E5E5; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; background: #FFFDF5; }
  .row .period { font-size: 13px; font-weight: 600; color: #444; margin-bottom: 4px; }
  .save-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 3px; color: #fff; }
  .save-badge.green { background: #1B7B6E; }
  .save-badge.gold { background: #E8B54D; }
  .price { font-size: 26px; font-weight: 700; margin-top: 4px; }
  .price .suffix { font-size: 13px; font-weight: 400; color: #999; }
  .monthly { font-size: 13px; color: #999; margin-top: 2px; }
  .breakdown-box { background: #fff; border-radius: 8px; border: 1px solid #E5E5E5; margin-top: 24px; overflow: hidden; }
  .breakdown-box .title { padding: 16px 24px; border-bottom: 1px solid #E5E5E5; font-size: 14px; font-weight: 600; }
  .calc-table { width: 100%; font-size: 13px; border-collapse: collapse; }
  .calc-table th { text-align: left; padding: 8px 4px; font-weight: 600; color: #444; font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; border-bottom: 1px solid #E5E5E5; }
  .calc-table td { padding: 8px 4px; border-bottom: 1px solid #F0F0F0; }
  .tbl-wrap { padding: 0 24px 16px; overflow-x: auto; }
  .calc-table tr.total-row td { font-weight: 700; border-top: 2px solid #E5E5E5; border-bottom: none; }
  .empty { background: #fff; border-radius: 8px; border: 1px solid #E5E5E5; padding: 40px; text-align: center; color: #999; font-size: 14px; }
  .footer { text-align: center; padding: 24px 0 8px; font-size: 11px; color: #999; }
  .row-push-btn { margin-top: 12px; width: 100%; padding: 7px 12px; background: transparent; border: 1px solid #DDD; border-radius: 4px; font-size: 12px; font-weight: 600; color: #888; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 6px; transition: border-color 0.15s, color 0.15s, background 0.15s; }

  .row-push-btn.sent { border-color: #1B7B6E; color: #1B7B6E; background: #EAF5F3; }
  .row.ep .row-push-btn:hover { border-color: #FF7A59; color: #FF7A59; background: #FFF0EB; }
  .row.ep .row-push-btn.sent { background: #EAF5F3; }
  .hs-panel { background: #fff; border-radius: 8px; border: 1px solid #E5E5E5; margin-top: 24px; overflow: hidden; }
  .hs-deal-id-input { padding: 7px 12px; border: 1px solid #E5E5E5; border-radius: 4px; font-size: 14px; font-family: inherit; color: #1A1A1A; outline: none; width: 180px; }

  .hs-status { padding: 10px 24px; font-size: 13px; display: none; }
  .hs-status.success { background: #EAF5F3; color: #1B7B6E; border-top: 1px solid #C3DED9; display: block; }
  .hs-status.error { background: #FEF2F2; color: #B91C1C; border-top: 1px solid #FECACA; display: block; }
  .hs-status.loading { background: #F5F5F5; color: #666; border-top: 1px solid #E5E5E5; display: block; }
  .country-flag { font-size: 16px; margin-right: 2px; }
  .tab-bar { display: flex; border-bottom: 1px solid #E5E5E5; padding: 0 24px; background: #fff; gap: 0; }
  .tab-btn { padding: 12px 18px; font-size: 13px; font-weight: 600; color: #999; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; font-family: inherit; margin-bottom: -1px; transition: color 0.15s, border-color 0.15s; }

var TIERS = [
  { label:"0",      count:0,   elps:0, priceKey:"price_elite_60"  },
  { label:"1-5",    count:5,   elps:1, priceKey:"price_elite_5"   },
  { label:"6-15",   count:15,  elps:2, priceKey:"price_elite_15"  },
  { label:"16-30",  count:30,  elps:3, priceKey:"price_elite_30"  },
  { label:"31-60",  count:60,  elps:5, priceKey:"price_elite_60"  },
  { label:"61-100", count:100, elps:7, priceKey:"price_elite_100" },
];

var rows   = [];
var nextId = 0;
var lastPricing = null;

function psych(v) {
  if (v <= 0)    return 0;
  if (v < 1000)  return Math.round(v / 10)  * 10;
  if (v < 10000) return Math.round(v / 100) * 100;
  return Math.round(v / 500) * 500;
}
function fmt(v)    { return "\u20AC" + v.toLocaleString("en-US"); }
function fmtDec(v) { return "\u20AC" + v.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,","); }

function getDistrictData(countryCode, loc) {
  var districts = ALL_DATA[countryCode] || [];
  if (loc === "__whole__") {
    var maxD = districts[0];
    for (var i = 1; i < districts.length; i++) {
      if (districts[i].district !== "Other" && districts[i].price_elite_60 > maxD.price_elite_60) maxD = districts[i];
    }
    return { data: maxD, source: maxD.district };
  }
  for (var i = 0; i < districts.length; i++) {
    if (districts[i].district === loc) return { data: districts[i], source: null };
  }
  return { data: districts[0], source: null };
}

function addRow(countryCode, loc, tierIdx, elps) {
  var id = nextId++;
  var ti = tierIdx || 0;
  var defaultElps = (elps != null) ? elps : Math.max(1, TIERS[ti].elps);
  rows.push({ id: id, country: countryCode || "ES", loc: loc || "__whole__", tierIdx: ti, elps: defaultElps });
  renderRows();
  render();
}

function removeRow(id) {
  rows = rows.filter(function(r){ return r.id !== id; });
  renderRows();
  render();
}

function buildDistrictOptions(countryCode, selectedLoc) {
  var districts = ALL_DATA[countryCode] || [];
  var html = '<option value="__whole__"' + (selectedLoc === "__whole__" ? " selected" : "") + '>Whole Country</option>';
  for (var j = 0; j < districts.length; j++) {
    html += '<option value="' + districts[j].district + '"' + (selectedLoc === districts[j].district ? " selected" : "") + '>' + districts[j].district + '</option>';
  }
  return html;
}

function renderRows() {
  var container = document.getElementById("rows-container");
  container.innerHTML = "";

  for (var i = 0; i < rows.length; i++) {
    var r   = rows[i];
    var div = document.createElement("div");
    div.className = "input-row";
    div.setAttribute("data-id", r.id);
    var showRemove = rows.length > 1;

    var html = '<div><label>Country</label><select class="sel-country" data-id="' + r.id + '">';
    var countries = Object.keys(COUNTRY_NAMES).sort();
    for (var k = 0; k < countries.length; k++) {
      html += '<option value="' + countries[k] + '"' + (r.country === countries[k] ? " selected" : "") + '>' + COUNTRY_NAMES[countries[k]] + '</option>';
    }
    html += '</select></div>';

    html += '<div><label>Region / Province</label><select class="sel-loc" data-id="' + r.id + '">' + buildDistrictOptions(r.country, r.loc) + '</select></div>';

    html += '<div><label>Listings</label><select class="sel-tier" data-id="' + r.id + '">';
    for (var j = 0; j < TIERS.length; j++) {
      if (TIERS[j].label === '61-100' && (r.country === 'IT' || r.country === 'FR')) continue;
      html += '<option value="' + j + '"' + (r.tierIdx === j ? " selected" : "") + '>' + TIERS[j].label + '</option>';
    }
    html += '</select></div>';

    html += '<div><label>ELPs</label><select class="sel-elps" data-id="' + r.id + '">';
    for (var j = 1; j <= 20; j++) {
      html += '<option value="' + j + '"' + (r.elps === j ? " selected" : "") + '>' + j + '</option>';
    }
    html += '</select></div>';

    html += showRemove
      ? '<button class="btn-remove" data-id="' + r.id + '">&times;</button>'
      : '<div style="width:32px"></div>';

    div.innerHTML = html;
    container.appendChild(div);
  }

  // Attach events
  var container = document.getElementById("rows-container");

  container.querySelectorAll(".sel-country").forEach(function(el) {
    el.addEventListener("change", function() {
      var id = parseInt(this.getAttribute("data-id"));
      for (var j = 0; j < rows.length; j++) {
        if (rows[j].id === id) {
          rows[j].country = this.value;
          rows[j].loc = "__whole__";
          // Reset 61-100 tier if switching to IT or FR
          if ((this.value === 'IT' || this.value === 'FR') && rows[j].tierIdx === 5) {
            rows[j].tierIdx = 4;
            rows[j].elps = Math.max(1, TIERS[4].elps);
          }
        }
      }
      renderRows(); render();
    });
  });
  container.querySelectorAll(".sel-loc").forEach(function(el) {
    el.addEventListener("change", function() {
      var id = parseInt(this.getAttribute("data-id"));
      for (var j = 0; j < rows.length; j++) { if (rows[j].id === id) rows[j].loc = this.value; }
      render();
    });
  });
  container.querySelectorAll(".sel-tier").forEach(function(el) {
    el.addEventListener("change", function() {
      var id = parseInt(this.getAttribute("data-id"));
      var newTier = parseInt(this.value);
      for (var j = 0; j < rows.length; j++) {
        if (rows[j].id === id) {
          rows[j].tierIdx = newTier;
          rows[j].elps = Math.max(1, TIERS[newTier].elps);
        }
      }
      renderRows(); render();
    });
  });
  container.querySelectorAll(".sel-elps").forEach(function(el) {
    el.addEventListener("change", function() {
      var id = parseInt(this.getAttribute("data-id"));
      for (var j = 0; j < rows.length; j++) { if (rows[j].id === id) rows[j].elps = parseInt(this.value); }
      render();
    });
  });
  container.querySelectorAll(".btn-remove").forEach(function(el) {
    el.addEventListener("click", function() { removeRow(parseInt(this.getAttribute("data-id"))); });
  });
}

function render() {
  var $output = document.getElementById("output");
  var rowCalcs = [];
  var totalListings = 0, totalElps = 0, hasAny = false;

  for (var i = 0; i < rows.length; i++) {
    var r    = rows[i];
    var tier = TIERS[r.tierIdx];
    var info = getDistrictData(r.country, r.loc);
    var d    = info.data;

    if (!d || tier.count === 0) { rowCalcs.push(null); continue; }
    hasAny = true;

    var cnt        = tier.count;
    var rElps      = r.elps;
    var elpMo      = d.price_elp_3m;
    var priceElite = d[tier.priceKey];

    var e3r  = priceElite * cnt;
    var e6r  = priceElite * 2 * 0.9 * cnt;
    var e12r = priceElite * 4 * 0.8 * cnt;
    var ep_e3r  = elpMo * rElps;
    var ep_e6r  = elpMo * 2 * 0.9 * rElps;
    var ep_e12r = elpMo * 4 * 0.8 * rElps;

    totalListings += cnt;
    totalElps     += rElps;

    rowCalcs.push({
      country:    r.country,
      loc:        r.loc === "__whole__" ? "Whole Country" : r.loc,
      source:     info.source,
      tier:       tier,
      cnt:        cnt,
      elps:       rElps,
      elpPrice:   elpMo,
      e3r:e3r, e6r:e6r, e12r:e12r,
      elp3r:ep_e3r, elp6r:ep_e6r, elp12r:ep_e12r,
    });
  }

  if (!hasAny) {
    lastPricing = null;
    $output.innerHTML = '<div class="empty">Select a listing tier to see pricing.</div>';
    return;
  }

  // Elite: sum psych per row, then floor
  var e3=0, e6=0, e12=0;
  var ep3r=0, ep6r=0, ep12r=0;
  for (var i = 0; i < rowCalcs.length; i++) {
    var rc = rowCalcs[i]; if (!rc) continue;
    e3    += psych(rc.e3r);  e6    += psych(rc.e6r);  e12    += psych(rc.e12r);
    ep3r  += rc.e3r + rc.elp3r; ep6r += rc.e6r + rc.elp6r; ep12r += rc.e12r + rc.elp12r;
  }
  e3  = Math.max(e3,  300); e6  = Math.max(e6,  570); e12  = Math.max(e12,  1080);

  // Elite Plus: psych the combined raw total, then floor
  var ep3  = Math.max(psych(ep3r),  300);
  var ep6  = Math.max(psych(ep6r),  570);
  var ep12 = Math.max(psych(ep12r), 1080);

  var eSave6=Math.max(e3*2-e6,0), eSave12=Math.max(e3*4-e12,0);
  var epSave6=Math.max(ep3*2-ep6,0), epSave12=Math.max(ep3*4-ep12,0);

  var activeRows = rowCalcs.filter(function(r){ return r; });
  var tierLabels = activeRows.map(function(r){ return r.tier.label; }).join(" + ") + " Listings";

  var provinceSummary = activeRows.map(function(rc) {
    return (COUNTRY_NAMES[rc.country] || rc.country) + " \u2014 " + rc.loc + (rc.source?" ("+rc.source+")":"") + ": " + rc.tier.label + " listings, " + rc.elps + " ELPs";
  }).join("\n");
  var provinceLabel = activeRows.map(function(rc){ return rc.loc; }).join(", ");
  var countryLabel  = activeRows.map(function(rc){ return rc.country; }).join(", ");

  lastPricing = {
    elite_3m:e3, elite_6m:e6, elite_12m:e12, ep_3m:ep3, ep_6m:ep6, ep_12m:ep12,
    totalListings:totalListings, totalElps:totalElps,
    listingLabel:tierLabels, provinceSummary:provinceSummary, provinceLabel:provinceLabel, countryLabel:countryLabel,
  };

  var hsIcon = '<svg width="12" height="12" viewBox="0 0 56 56" fill="none"><circle cx="28" cy="28" r="28" fill="#FF7A59"/><path d="M22 16v10.5M22 26.5a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11ZM34 22.5a3 3 0 1 0 0-6 3 3 0 0 0 0 6Zm0-3v7.5m0 0a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11Z" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>';

  var periods = [
    { label:"3 Months",  mo:3,  eT:e3,  epT:ep3,  eSave:0,       epSave:0        },
    { label:"6 Months",  mo:6,  eT:e6,  epT:ep6,  eSave:eSave6,  epSave:epSave6  },
    { label:"12 Months", mo:12, eT:e12, epT:ep12, eSave:eSave12, epSave:epSave12 },
  ];
  var planKeys = ["elite_3m","elite_6m","elite_12m"];
  var epKeys   = ["ep_3m","ep_6m","ep_12m"];

  var html = '<div class="cards">';
  html += '<div class="card-head elite"><h2>Elite</h2><div class="sub">' + tierLabels + '</div><div class="sub" style="visibility:hidden">_</div></div>';
  html += '<div class="card-head ep"><div class="badge-rec">Recommended</div><h2>Elite Plus</h2><div class="sub">' + tierLabels + '</div><div class="elp-info">' + totalElps + ' Promoted Listing' + (totalElps!==1?'s':'') + '</div></div>';

  for (var i = 0; i < periods.length; i++) {
    var p = periods[i], last = (i===2) ? " last" : "";
    html += '<div class="row elite' + last + '">';
    html += '<div class="period">' + p.label + '</div>';
    if (p.eSave > 0) html += '<div><span class="save-badge green">Save ' + fmt(p.eSave) + '</span></div>';
    html += '<div class="price">' + fmt(p.eT) + ' <span class="suffix">Total</span></div>';
    html += '<div class="monthly">' + fmtDec(p.eT/p.mo) + ' / Month</div>';
    html += '<button class="row-push-btn" data-plan="' + planKeys[i] + '">' + hsIcon + 'Update Deal</button>';
    html += '</div>';

    html += '<div class="row ep' + last + '">';
    html += '<div class="period">' + p.label + '</div>';
    if (p.epSave > 0) html += '<div><span class="save-badge gold">Save ' + fmt(p.epSave) + '</span></div>';
    html += '<div class="price">' + fmt(p.epT) + ' <span class="suffix">Total</span></div>';
    html += '<div class="monthly">' + fmtDec(p.epT/p.mo) + ' / Month</div>';
    html += '<button class="row-push-btn" data-plan="' + epKeys[i] + '">' + hsIcon + 'Update Deal</button>';
    html += '</div>';
  }
  html += '</div>';

  // Breakdown table (tabbed)
  html += '<div class="breakdown-box">';
  html += '<div class="tab-bar">';
  html += '<button class="tab-btn active" onclick="showTab(this,\'tab-prices\')">Prices</button>';
  html += '<button class="tab-btn" onclick="showTab(this,\'tab-components\')">Components</button>';
  html += '</div>';

  // --- Tab 1: Prices ---
  html += '<div id="tab-prices" class="tab-pane active"><div class="tbl-wrap">';
  html += '<table class="calc-table"><thead><tr><th>Country</th><th>Region</th><th>Listings</th><th>ELPs</th>';
  html += '<th>Elite (3m)</th><th>Elite (6m)</th><th>Elite (12m)</th>';
  html += '<th>Elite+ (3m)</th><th>Elite+ (6m)</th><th>Elite+ (12m)</th>';
  html += '</tr></thead><tbody>';

  for (var i = 0; i < rowCalcs.length; i++) {
    var rc = rowCalcs[i]; if (!rc) continue;
    var regionLabel = rc.loc + (rc.source ? ' <span style="font-size:11px;color:#1B7B6E">(' + rc.source + ')</span>' : '');
    var td_e3, td_e6, td_e12, td_ep3, td_ep6, td_ep12;
    if (activeRows.length === 1) {
      td_e3=e3; td_e6=e6; td_e12=e12; td_ep3=ep3; td_ep6=ep6; td_ep12=ep12;
    } else {
      td_e3=psych(rc.e3r); td_e6=psych(rc.e6r); td_e12=psych(rc.e12r);
      td_ep3=psych(rc.e3r+rc.elp3r); td_ep6=psych(rc.e6r+rc.elp6r); td_ep12=psych(rc.e12r+rc.elp12r);
    }
    html += '<tr>';
    html += '<td>' + (COUNTRY_NAMES[rc.country]||rc.country) + '</td>';
    html += '<td>' + regionLabel + '</td>';
    html += '<td>' + rc.tier.label + '</td><td>' + rc.elps + '</td>';
    html += '<td>'+fmt(td_e3)+'</td><td>'+fmt(td_e6)+'</td><td>'+fmt(td_e12)+'</td>';
    html += '<td>'+fmt(td_ep3)+'</td><td>'+fmt(td_ep6)+'</td><td>'+fmt(td_ep12)+'</td>';
    html += '</tr>';
  }
  if (activeRows.length > 1) {
    html += '<tr class="total-row"><td colspan="2">Total</td><td>'+totalListings+'</td><td>'+totalElps+'</td>';
    html += '<td>'+fmt(e3)+'</td><td>'+fmt(e6)+'</td><td>'+fmt(e12)+'</td>';
    html += '<td>'+fmt(ep3)+'</td><td>'+fmt(ep6)+'</td><td>'+fmt(ep12)+'</td>';
    html += '</tr>';
  }
  html += '</tbody></table></div></div>';

  // --- Tab 2: Components ---
  html += '<div id="tab-components" class="tab-pane"><div class="tbl-wrap">';
  html += '<table class="calc-table"><thead><tr>';
  html += '<th>Country</th><th>Region</th>';
  html += '<th>Median Lead Value</th><th>Commission</th><th>Conversion</th>';
  html += '<th>Leads / Listing (3m)</th><th>Lead / ELP (3m)</th><th>Demand Mult.</th>';
  html += '<th>Take Rate (Elite)</th><th>Take Rate (ELP)</th><th>Listings w/ Leads</th>';
  html += '</tr></thead><tbody>';

  var seenDistricts = {};
  for (var i = 0; i < rowCalcs.length; i++) {
    var rc = rowCalcs[i]; if (!rc) continue;
    var distKey = rc.country + '::' + rc.loc;
    if (seenDistricts[distKey]) continue;
    seenDistricts[distKey] = true;
    var regionLabel2 = rc.loc + (rc.source ? ' <span style="font-size:11px;color:#1B7B6E">(' + rc.source + ')</span>' : '');
    var cdata = (COMPONENTS_DATA[rc.country] || {})[rc.loc === 'Whole Country' ? (rc.source || rc.loc) : rc.loc] || {};
    var median = cdata.median ? '€' + Math.round(cdata.median).toLocaleString('en-US') : '—';
    var commission = cdata.commission ? (cdata.commission * 100).toFixed(0) + '%' : '—';
    var conversion = cdata.conversion ? (cdata.conversion * 100).toFixed(0) + '%' : '—';
    var lpl = cdata.leads_per_listing !== undefined ? cdata.leads_per_listing : '—';
    var lepelp = cdata.lead_per_elp_3m !== undefined ? cdata.lead_per_elp_3m : '—';
    var dmult = cdata.demand_multiplier !== undefined ? cdata.demand_multiplier + '×' : '—';
    var lwl = cdata.listings_with_leads !== null && cdata.listings_with_leads !== undefined ? cdata.listings_with_leads : '—';
    html += '<tr>';
    html += '<td>' + (COUNTRY_NAMES[rc.country]||rc.country) + '</td>';
    html += '<td>' + regionLabel2 + '</td>';
    html += '<td>' + median + '</td>';
    html += '<td>' + commission + '</td>';
    html += '<td>' + conversion + '</td>';
    html += '<td>' + lpl + '</td>';
    html += '<td>' + lepelp + '</td>';
    html += '<td>' + dmult + '</td>';
    html += '<td>10% / 8% / 7% / 6% / 5%</td>';
    html += '<td>10%</td>';
    html += '<td>' + lwl + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table></div></div>';

  html += '</div>'; // end breakdown-box
  html += '<div class="hs-panel"><div id="hs-status" class="hs-status"></div></div>';

  $output.innerHTML = html;

  $output.querySelectorAll(".row-push-btn").forEach(function(btn) {
    btn.addEventListener("click", function(){ pushToHubSpot(this.getAttribute("data-plan"), this); });
  });
}

function pushToHubSpot(planKey, btn) {
  var dealId  = (document.getElementById("hs-deal-id").value||"").trim();
  var $status = document.getElementById("hs-status");
  if (!dealId) { $status.className="hs-status error"; $status.textContent="Please enter a HubSpot Deal ID first."; document.getElementById("hs-deal-id").focus(); return; }
  if (!lastPricing) { $status.className="hs-status error"; $status.textContent="No pricing data available."; return; }

  var planLabels = { elite_3m:"Elite \u2014 3 Months", elite_6m:"Elite \u2014 6 Months", elite_12m:"Elite \u2014 12 Months", ep_3m:"Elite Plus \u2014 3 Months", ep_6m:"Elite Plus \u2014 6 Months", ep_12m:"Elite Plus \u2014 12 Months" };
  var subTypes   = { elite_3m:"Elite", elite_6m:"Elite", elite_12m:"Elite", ep_3m:"Elite Plus", ep_6m:"Elite Plus", ep_12m:"Elite Plus" };
  var termMonths = { elite_3m:3, elite_6m:6, elite_12m:12, ep_3m:3, ep_6m:6, ep_12m:12 };

  var payload = {
    deal_id: dealId,
    plan_label: planLabels[planKey],
    amount: lastPricing[planKey],
    elite_3m: lastPricing.elite_3m, elite_6m: lastPricing.elite_6m, elite_12m: lastPricing.elite_12m,
    ep_3m: lastPricing.ep_3m, ep_6m: lastPricing.ep_6m, ep_12m: lastPricing.ep_12m,
    listing_label: lastPricing.listingLabel,
    total_listings: lastPricing.totalListings,
    total_elps: lastPricing.totalElps,
    province_summary: lastPricing.provinceSummary,
    price_country: lastPricing.countryLabel,
    price_sub_type: subTypes[planKey],
    price_term_months: termMonths[planKey],
    price_listings: lastPricing.listingLabel,
    price_additional_elps: lastPricing.totalElps,
    price_province: lastPricing.provinceLabel,
  };

  var allBtns = document.querySelectorAll(".row-push-btn");
  allBtns.forEach(function(b){ b.disabled=true; });
  var origHTML = btn.innerHTML;
  btn.innerHTML = "Sending\u2026";
  $status.className="hs-status loading"; $status.textContent="Updating deal "+dealId+"\u2026";

  fetch(N8N_WEBHOOK_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload) })
    .then(function(res){ if(!res.ok) throw new Error("HTTP "+res.status); return res.json().catch(function(){ return {}; }); })
    .then(function(){
      $status.className="hs-status success";
      $status.textContent="\u2713 Deal "+dealId+" updated \u2014 "+planLabels[planKey]+" ("+fmt(lastPricing[planKey])+") set as Amount, pricing note added.";
      btn.innerHTML="\u2713 Sent"; btn.classList.add("sent");
      setTimeout(function(){ btn.innerHTML=origHTML; btn.classList.remove("sent"); }, 3000);
      allBtns.forEach(function(b){ b.disabled=false; });
    })
    .catch(function(err){
      $status.className="hs-status error"; $status.textContent="Error: "+err.message;
      btn.innerHTML=origHTML; allBtns.forEach(function(b){ b.disabled=false; });
    });
}

document.getElementById("btn-add").addEventListener("click", function(){ addRow(); });

function showTab(btn, tabId) {
  var box = btn.closest('.breakdown-box');
  box.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  box.querySelectorAll('.tab-pane').forEach(function(p){ p.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById(tabId).classList.add('active');
}

// Init
addRow("ES", "__whole__", 0, 0);
</script>
